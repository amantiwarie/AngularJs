<!DOCTYPE html>
<html ng-app="myApp">
<head>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="app.js"></script>
</head>
<body ng-controller="myController">

<h1>27 - Focus Events</h1>

<input type="text"
       ng-model="name"
       ng-focus="onFocus()"
       ng-blur="onBlur()"
       placeholder="Enter your name">

<p>{{ message }}</p>

</body>
</html>
