

<!DOCTYPE html>
<html ng-app="myApp">
<head>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="app.js"></script>

    <style>
        .red {
            color: red;
        }

        .blue {
            color: blue;
        }

</h2>


</body>
</html>
