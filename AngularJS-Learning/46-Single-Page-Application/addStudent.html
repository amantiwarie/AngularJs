<div class="card p-4">

    <h3 class="mb-3">
        Add Student
    </h3>

    <form ng-submit="addStudent()">

        <div class="mb-3">

            <label>Name</label>

            <input type="text"
                   ng-model="student.name"
                   class="form-control"
                   required>

        </div>

        <div class="mb-3">

            <label>Course</label>

            <input type="text"
                   ng-model="student.course"
                   class="form-control"
                   required>

        </div>

        <button class="btn btn-success">

            Add Student

        </button>

    </form>

</div>
